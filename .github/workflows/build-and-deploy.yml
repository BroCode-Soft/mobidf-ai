name: Build and Deploy to Registry

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ${{ github.repository }}/mobidf-backend
  IMAGE_NAME_FRONTEND: ${{ github.repository }}/mobidf-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          build-args: |
            BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.meta-backend.outputs.version }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            NODE_VERSION=20-alpine
            BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.meta-frontend.outputs.version }}

  deploy-to-self-hosted:
    needs: build-and-push
    runs-on: self-hosted
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure production environment
        run: |
          cat > .env << 'ENVEOF'
          # ============================================================================
          # PostgreSQL Configuration - Production
          # ============================================================================
          POSTGRES_USER=mobidf
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD_PROD }}
          POSTGRES_DB=mobidf
          POSTGRES_PORT=5432
          
          # ============================================================================
          # Backend Configuration - Production
          # ============================================================================
          BACKEND_PORT=8000
          DEBUG=false
          SECRET_KEY=${{ secrets.SECRET_KEY_PROD }}
          CORS_ORIGINS=https://mobidf.brocode.net.br,https://www.mobidf.brocode.net.br
          
          # ETL / External APIs
          GTFS_DF_URL=https://www.dados.df.gov.br/dataset/gtfs-df/resource/gtfs-df.zip
          GTFS_RT_URL=https://www.semob.df.gov.br/gtfs-rt/vehicle-positions
          IBGE_API_URL=https://servicodados.ibge.gov.br/api/v3
          GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}
          
          # ============================================================================
          # Frontend Configuration - Production
          # ============================================================================
          FRONTEND_PORT=3000
          NEXT_PUBLIC_API_URL=https://mobidf.brocode.net.br/api
          NODE_ENV=production
          NEXT_PUBLIC_MAP_TILE_URL=https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png
          ENVEOF
          
          echo "✓ .env configured for production"
          echo "✓ CORS_ORIGINS: $(grep CORS_ORIGINS .env)"
          echo "✓ NEXT_PUBLIC_API_URL: $(grep NEXT_PUBLIC_API_URL .env)"
          echo "✓ NODE_ENV: $(grep NODE_ENV .env)"

      - name: Log in to Container Registry on self-hosted
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull latest images
        run: |
          docker compose pull
        env:
          COMPOSE_FILE: docker-compose.yml

      - name: Restart services with production overrides
        run: |
          docker compose -f docker-compose.yml -f docker-compose.prod.yml down
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
          
          echo "✓ Services started with production configuration"
        env:
          COMPOSE_FILE: docker-compose.yml

      - name: Check service health
        run: |
          echo "Waiting for services to be healthy..."
          sleep 10
          
          echo "Backend health check:"
          curl -f http://localhost:8000/health || echo "Backend health check pending..."
          
          echo "Frontend health check:"
          curl -f http://localhost:3000 || echo "Frontend health check pending..."
          
          echo ""
          echo "Verifying environment configuration:"
          echo "Backend environment:"
          docker exec mobidf-backend env | grep -E "CORS_ORIGINS|NODE_ENV|DEBUG" || echo "Could not verify backend env"
          
          echo ""
          echo "Frontend environment:"
          docker exec mobidf-frontend env | grep -E "NEXT_PUBLIC_API_URL|NODE_ENV" || echo "Could not verify frontend env"

      - name: Clean up Docker login
        if: always()
        run: |
          docker logout ghcr.io || true
