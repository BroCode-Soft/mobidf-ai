# Nginx configuration for MobiDF AI
# Reverse proxy for frontend (port 3000) and backend API (port 8000)
# 
# Usage:
#   1. Copy to /etc/nginx/sites-available/
#   2. Create symlink: ln -s /etc/nginx/sites-available/mobidf.brocode.net.br.conf /etc/nginx/sites-enabled/
#   3. Test config: nginx -t
#   4. Reload: systemctl reload nginx
#
# For HTTPS with Let's Encrypt:
#   certbot --nginx -d mobidf.brocode.net.br

# Upstream servers
upstream mobidf_frontend {
    server localhost:3000;
    keepalive 32;
}

upstream mobidf_backend {
    server localhost:8000;
    keepalive 32;
}

# HTTP redirect to HTTPS (optional, enable after setting up SSL)
server {
    listen 80;
    listen [::]:80;
    server_name mobidf.brocode.net.br www.mobidf.brocode.net.br;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS (uncomment after SSL setup)
    # location / {
    #     return 301 https://$server_name$request_uri;
    # }
}

# HTTPS Server Configuration
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mobidf.brocode.net.br www.mobidf.brocode.net.br;

    # SSL Certificate paths (update with your certificate paths)
    # For Let's Encrypt: /etc/letsencrypt/live/mobidf.brocode.net.br/
    ssl_certificate /etc/letsencrypt/live/mobidf.brocode.net.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mobidf.brocode.net.br/privkey.pem;

    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/mobidf.brocode.net.br/chain.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Logging
    access_log /var/log/nginx/mobidf.access.log;
    error_log /var/log/nginx/mobidf.error.log;

    # Client body size limit
    client_max_body_size 100M;

    # Root location - Frontend (Next.js)
    location / {
        proxy_pass http://mobidf_frontend;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering off;
        proxy_request_buffering off;

        # Keep-alive
        proxy_set_header Connection "";
    }

    # Backend API - /api/* -> Backend service (passes /api/ prefix through)
    location /api/ {
        proxy_pass http://mobidf_backend/api/;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # CORS headers (optional, if not set by backend)
        add_header 'Access-Control-Allow-Origin' '$http_origin' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Accept, Authorization, Cache-Control, Content-Type, DNT, If-Modified-Since, Keep-Alive, Origin, User-Agent, X-Requested-With' always;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering off;
        proxy_request_buffering off;

        # Keep-alive
        proxy_set_header Connection "";
    }

    # Backend API Swagger documentation - at /api/docs
    location /api/docs {
        proxy_pass http://mobidf_backend/api/docs;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
    }

    # Backend API OpenAPI schema - at /api/openapi.json
    location /api/openapi.json {
        proxy_pass http://mobidf_backend/api/openapi.json;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_buffering off;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://mobidf_backend/health;
        proxy_http_version 1.1;

        access_log off;
        proxy_buffering off;
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
    }

    location ~ ~$ {
        deny all;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/xml text/javascript
               application/x-javascript application/xml+rss
               application/javascript application/json;
    gzip_min_length 1000;
}
